<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&family=Rubik:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #25282A; /* Mejorado para contraste WCAG AA */
            --blue: #0089C1;
            --green: #4AA25D;
            --yellow: #F9B623;
            --bg-light: #EEF7FA;
            --text-muted: #3E5465; /* Mejorado para contraste */
            --land-color: #D1E4ED;
        }

        body { margin: 0; padding: 0; background: var(--bg-light); font-family: 'Rubik', sans-serif; }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
            outline: none;
        }

        .world-map {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));
        }

        .continent {
            fill: var(--land-color);
            stroke: #FFFFFF;
            stroke-width: 0.5;
        }

        /* Marcadores */
        .marker {
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-box: fill-box;
            transform-origin: center;
            outline: none;
        }

        .marker:hover, .marker:focus {
            transform: scale(1.6);
            filter: brightness(1.1);
        }

        /* Indicador de foco para accesibilidad */
        .marker:focus-visible {
            filter: drop-shadow(0 0 4px white) drop-shadow(0 0 8px var(--blue));
        }

        .marker-g1, .marker-g2 { fill: var(--blue); }
        .marker-g3 { fill: var(--green); }
        .marker-g4 { fill: var(--yellow); }

        .marker-pulse {
            animation: pulse 2s infinite;
            opacity: 0.4;
            pointer-events: none;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            70% { transform: scale(2.5); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* Área táctil invisible (P2: Hit testing area) */
        .hit-area {
            fill: transparent;
            cursor: pointer;
        }

        /* Tooltip */
        .custom-tooltip {
            position: absolute;
            background: white;
            padding: 12px 18px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            pointer-events: none;
            display: none;
            z-index: 1000;
            min-width: 160px;
            transform: translate(-50%, -100%);
            border-bottom: 4px solid var(--blue);
            margin-top: -20px;
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 0;
        }

        .custom-tooltip.visible {
            display: block;
            opacity: 1;
        }

        .custom-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid white;
        }

        .tooltip-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: var(--primary);
            margin-bottom: 2px;
            display: block;
        }

        .tooltip-cat {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
            color: var(--text-muted);
        }

        /* Colores dinámicos del tooltip */
        .custom-tooltip.cat-g3 { border-color: var(--green); }
        .custom-tooltip.cat-g4 { border-color: var(--yellow); }

        @media (max-width: 768px) {
            .map-container { padding: 20px 10px; }
            .custom-tooltip { padding: 10px 14px; min-width: 140px; }
        }
    </style>
</head>
<body>

<div class="map-container" id="mapWrapper" tabindex="-1">
    <div id="tooltip" class="custom-tooltip">
        <span class="tooltip-cat" id="tooltipCat">CATEGORÍA</span>
        <span class="tooltip-title" id="tooltipName">Ciudad, País</span>
    </div>
</div>

<script>
    const cityData = {
      "Grupo 1": [{name:"Guadalajara, México",lat:20.6597,lng:-103.3496},{name:"Cancún, México",lat:21.1619,lng:-86.8515},{name:"Punta Cana, RD",lat:18.5601,lng:-68.3725},{name:"Kingston, Jamaica",lat:17.9712,lng:-76.7936},{name:"Las Vegas, USA",lat:36.1699,lng:-115.1398},{name:"Dallas, USA",lat:32.7767,lng:-96.7970},{name:"Guatemala, Guatemala",lat:14.6349,lng:-90.5069}],
      "Grupo 2": [{name:"San José, Costa Rica",lat:9.9281,lng:-84.0907},{name:"Bogotá, Colombia",lat:4.7110,lng:-74.0721},{name:"Lima, Perú",lat:-12.0464,lng:-77.0428},{name:"Santiago, Chile",lat:-33.4489,lng:-70.6693},{name:"Alicante, España",lat:38.3452,lng:-0.4810},{name:"Guangzhou, China",lat:23.1291,lng:113.2644},{name:"Sydney, Australia",lat:-33.8688,lng:151.2093}],
      "Grupo 3": [{name:"Guadalajara, México",lat:20.6597,lng:-103.3496},{name:"Toledo, España",lat:39.8628,lng:-4.0273},{name:"Yangzhou, China",lat:32.3932,lng:119.4127}],
      "Grupo 4": [{name:"Medellín, Colombia",lat:6.2442,lng:-75.5812},{name:"Buenos Aires, Argentina",lat:-34.6037,lng:-58.3816},{name:"Kuala Lumpur, Malaysia",lat:3.1390,lng:101.6869}]
    };

    const groupMeta = {
        "Grupo 1": { label: "Oficina de Representación", class: "g1" },
        "Grupo 2": { label: "Oficina de Representación", class: "g2" },
        "Grupo 3": { label: "Fábrica Jypesa", class: "g3" },
        "Grupo 4": { label: "Fábrica Asociada", class: "g4" }
    };

    let wrapperRect = null;

    function initMap() {
        const wrapper = document.getElementById('mapWrapper');
        const tooltip = document.getElementById('tooltip');
        const tName = document.getElementById('tooltipName');
        const tCat = document.getElementById('tooltipCat');

        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 2000 1000");
        svg.setAttribute("class", "world-map");
        svg.setAttribute("aria-label", "Mapa interactivo de presencia global de Jypesa");

        // Cachear el rect para performance (P2 Fix)
        const updateRect = () => wrapperRect = wrapper.getBoundingClientRect();
        window.addEventListener('resize', updateRect);
        wrapper.addEventListener('mouseenter', updateRect);

        fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
            .then(res => res.json())
            .then(data => {
                const proj = (lng, lat) => ({ x: (lng + 180) * (2000 / 360), y: (90 - lat) * (1000 / 180) });

                // Dibujar países
                data.features.forEach(f => {
                    if (f.id === "ATA") return;
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    let d = "";
                    const coords = f.geometry.type === "Polygon" ? [f.geometry.coordinates] : f.geometry.coordinates;
                    coords.forEach(poly => {
                        poly[0].forEach((c, i) => {
                            const p = proj(c[0], c[1]);
                            d += (i === 0 ? "M" : "L") + p.x + "," + p.y;
                        });
                        d += "Z";
                    });
                    path.setAttribute("d", d);
                    path.setAttribute("class", "continent");
                    svg.appendChild(path);
                });

                // Dibujar Marcadores
                Object.keys(cityData).forEach(gName => {
                    cityData[gName].forEach(city => {
                        const meta = groupMeta[gName];
                        const p = proj(city.lng, city.lat);
                        
                        const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                        g.setAttribute("transform", `translate(${p.x}, ${p.y})`);
                        g.setAttribute("class", `marker marker-${meta.class}`);
                        g.setAttribute("tabindex", "0"); // Accesibilidad (P1 Fix)
                        g.setAttribute("role", "button");
                        g.setAttribute("aria-label", `${city.name}, ${meta.label}`);

                        // Área de hit (P2 Fix: Mobile/Touch)
                        const hitArea = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        hitArea.setAttribute("r", "22"); // Área de 44px
                        hitArea.setAttribute("class", "hit-area");
                        g.appendChild(hitArea);

                        const pulse = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        pulse.setAttribute("r", "8"); pulse.setAttribute("class", "marker-pulse");
                        
                        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        dot.setAttribute("r", "6");

                        g.appendChild(pulse); g.appendChild(dot);

                        const show = (e) => {
                            tName.textContent = city.name;
                            tCat.textContent = meta.label;
                            tooltip.className = `custom-tooltip visible cat-${meta.class}`;
                            if (e.type === 'focus' || e.type === 'keydown') {
                                // Posición fija para teclado sobre el marcador
                                const rect = wrapper.getBoundingClientRect();
                                // Aproximación simple para SVG local a pantalla
                                const svgRect = svg.getBoundingClientRect();
                                const scaleX = svgRect.width / 2000;
                                const scaleY = svgRect.height / 1000;
                                tooltip.style.left = (p.x * scaleX + (svgRect.left - rect.left)) + 'px';
                                tooltip.style.top = (p.y * scaleY + (svgRect.top - rect.top)) + 'px';
                            }
                        };

                        const hide = () => tooltip.classList.remove('visible');

                        const move = (e) => {
                            if (!wrapperRect) updateRect();
                            tooltip.style.left = (e.clientX - wrapperRect.left) + 'px';
                            tooltip.style.top = (e.clientY - wrapperRect.top) + 'px';
                        };

                        g.onmouseenter = show;
                        g.onmousemove = move;
                        g.onmouseleave = hide;
                        g.onfocus = show;
                        g.onblur = hide;
                        g.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') show(e); };

                        svg.appendChild(g);
                    });
                });
                wrapper.appendChild(svg);
                updateRect();
            });
    }
    initMap();
</script>

</body>
</html>
